openapi: "3.0.3"
info:
  title: Hello World API
  version: "1.0.0"
paths:
  /greetings:
    get:
      operationId: listGreetings
      parameters:
        - name: language
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: A list of greetings
    post:
      operationId: createGreeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGreetingRequest"
      responses:
        "201":
          description: The created greeting
components:
  schemas:
    Greeting:
      type: object
      required: [id, message, language, created_at]
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string
          minLength: 1
          maxLength: 280
        language:
          type: string
          enum:
            - en
            - de
            - fr
        created_at:
          type: string
          format: date-time
        expires_on:
          type: string
          format: date
        tags:
          type: array
          items:
            type: string
          maxItems: 10
          uniqueItems: true

    CreateGreetingRequest:
      type: object
      required: [message, language]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 280
        language:
          type: string
          enum:
            - en
            - de
            - fr
        expires_on:
          type: string
          format: date
        tags:
          type: array
          items:
            type: string
          maxItems: 10
          uniqueItems: true
